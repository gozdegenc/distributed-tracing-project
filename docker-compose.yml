services:

  # ── Jaeger ─────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14268:14268"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - tracing-net

  # ── API Gateway ────────────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
      - ORDER_SERVICE_URL=http://order-service:8001
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
    volumes:
      - ./jmeter-tests:/app/jmeter-tests:ro
    depends_on:
      - jaeger
      - order-service
    networks:
      - tracing-net

  # ── Order Service ──────────────────────────────────────────────────────────
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8001:8001"
    environment:
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
      - INVENTORY_SERVICE_URL=http://inventory-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
    depends_on:
      - jaeger
      - inventory-service
      - notification-service
    networks:
      - tracing-net

  # ── Inventory Service ──────────────────────────────────────────────────────
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8002:8002"
    environment:
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - jaeger
    networks:
      - tracing-net

  # ── Notification Service ───────────────────────────────────────────────────
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8004:8004"
    environment:
      - JAEGER_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - jaeger
    networks:
      - tracing-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tracing-net

networks:
  tracing-net:
    driver: bridge

